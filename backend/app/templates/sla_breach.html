<!DOCTYPE html>
<html><body style="font-family: Arial, sans-serif; color: #1f2937;">
  <h2 style="color: #dc2626;">⚠ Alerta SLA — Ticket #{ticket_id}</h2>
  <p>O ticket <strong>{title}</strong> excedeu o prazo de SLA.</p>
  <table style="border-collapse: collapse; margin: 16px 0;">
    <tr><td style="padding: 4px 12px; font-weight: bold;">Prioridade</td><td>{priority}</td></tr>
    <tr><td style="padding: 4px 12px; font-weight: bold;">Prazo</td><td>{deadline}</td></tr>
  </table>
  <p>Por favor, dê prioridade à resolução deste pedido.</p>
</body></html>
