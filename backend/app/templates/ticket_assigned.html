<!DOCTYPE html>
<html><body style="font-family: Arial, sans-serif; color: #1f2937;">
  <h2 style="color: #2563eb;">Ticket #{ticket_id} atribuído</h2>
  <p>Foi-lhe atribuído um novo ticket:</p>
  <table style="border-collapse: collapse; margin: 16px 0;">
    <tr><td style="padding: 4px 12px; font-weight: bold;">Título</td><td>{title}</td></tr>
    <tr><td style="padding: 4px 12px; font-weight: bold;">Prioridade</td><td>{priority}</td></tr>
  </table>
  <p style="background: #f3f4f6; padding: 12px; border-left: 3px solid #2563eb;">{description}</p>
  <p style="color: #6b7280; font-size: 12px;">Helpdesk Interno — Não responder a este email.</p>
</body></html>
